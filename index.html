<!DOCTYPE html>
<html lang="en">
<!--
  Color Scheme: Mixed
  #585A73 - Dark blue-gray (containers, cards, gates)
  #F2AB6D - Warm orange (text, borders, accents)
  Grayscale additions:
  #D9D9D9 - Light gray (body background)
  #A6A6A6 - Medium gray (shadow)
  #262626 - Dark gray (GENERATIVE ART squares)
-->
<head>
  <meta charset="UTF-8" />
  <title>Generative Art Gallery</title>
  <script src="lib/p5/p5.min.js"></script>
  <script src="sketch.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #D9D9D9;
      color: #F2AB6D;
      font-family: "Courier New", "Courier", monospace;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      z-index: 0;
    }

    .container {
      width: 60%;
      height: 80vh;
      background: #585A73;
      border-radius: 16px;
      overflow-y: auto;
      position: relative;
      z-index: 2;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 2rem;
    }

    .app-card {
      width: 40%;
      padding: 2rem;
      background: #585A73;
      border: 2px solid #F2AB6D;
      border-radius: 12px;
      color: #F2AB6D;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s ease;
      margin-bottom: 1rem;
    }

    .app-card:hover {
      border: 2px solid #F2AB6D;
      transform: translate(-10px, -10px);
      box-shadow: 8px 8px 0px rgba(38, 38, 38, 0.2);
    }

    #close-gate-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: rgba(88, 90, 115, 0.1);
      border: 2px solid #585A73;
      border-radius: 50%;
      color: #585A73;
      font-size: 24px;
      cursor: pointer;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #close-gate-btn:hover {
      background: rgba(88, 90, 115, 0.2);
      transform: scale(1.1);
    }

  </style>
</head>
<body>
  <button id="close-gate-btn" onclick="closeGates()">↻</button>
  <div class="container">
    <div class="app-list">
      <div class="app-card" onclick="location.href='ArkadsGame/index.html'">
        Arkad's Game
      </div>
      <div class="app-card" onclick="location.href='GameOfLife/index.html'">
        Game of Life
      </div>
      <div class="app-card" onclick="location.href='SimpleWorld/index.html'">
        Simple World
      </div>
      <div class="app-card" onclick="location.href='CurvesBaby/index.html'">
        Curves
      </div>
      <div class="app-card" onclick="location.href='FireFlies/index.html'">
        Fire Flies
      </div>
      <div class="app-card" onclick="location.href='StrangeCircles/index.html'">
        Circles
      </div>
      <div class="app-card" onclick="location.href='ExpansiveDots/index.html'">
        Expansive Dots
      </div>
      <div class="app-card" onclick="location.href='PrettyDotsAndLine/index.html'">
        Pretty Dots and Line
      </div>
      <div class="app-card" onclick="location.href='FillTheGaps/index.html'">
        Fill the Gaps
      </div>
    </div>
  </div>
</body>
</html>
