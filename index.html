<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generative Art Gallery</title>
  <script src="lib/p5/p5.min.js"></script>
  <script src="sketch.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #181818;
      color: #A8A8A8;
      font-family: "Helvetica Neue", sans-serif;
      position: relative;
    }

    header {
      padding: 2rem 0;
      text-align: center;
      background: #181818;
      position: relative;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    .grid {
      border-top: 1px solid #4C4C4C;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3rem;
      padding: 10rem;
      width: 50%;
      margin: auto;
      place-items: center;
      position: relative;
      z-index: 10;
    }

    .card {
      width: 100px;
      height: 100px;
      padding: 30px;
      background: #181818;
      border: 1px solid #DBDBDB;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      z-index: 10;
    }

    .card:hover {
      border: 2px dotted #DBDBDB;
    }

  </style>
</head>
<body>
  <header>
    <h1>Generative Art Gallery</h1>
  </header>
  <section class="grid">
    <div class="card" onclick="location.href='GameOfLife/index.html'">
      Game of Life
    </div>

    <div class="card" onclick="location.href='SimpleWorld/index.html'">
      Simple World
    </div>

    <div class="card" onclick="location.href='CurvesBaby/index.html'">
      Curves
    </div>

    <div class="card" onclick="location.href='FireFlies/index.html'">
      Fire Flies
    </div>

    <div class="card" onclick="location.href='PlanetsBaby/index.html'">
      Planets Baby
    </div>

    <div class="card" onclick="location.href='StrangeCircles/index.html'">
      Circles
    </div>

    <div class="card" onclick="location.href='ArkadsGame/index.html'">
      Arkad's Game
    </div>

    <div class="card" onclick="location.href='CrazySquare/index.html'">
      Crazy Square
    </div>

    <div class="card" onclick="location.href='ExpansiveDots/index.html'">
      Expansive Dots
    </div>

    <div class="card" onclick="location.href='NeedyCircles/index.html'">
      Needy Circles
    </div>

    <div class="card" onclick="location.href='PrettyDotsAndLine/index.html'">
      Pretty Dots and Line
    </div>

    <div class="card" onclick="location.href='FillTheGaps/index.html'">
      Fill the Gaps
    </div>
  </section>
</body>
</html>
